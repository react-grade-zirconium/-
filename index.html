<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 학습 포털 MAX</title>
<style>
    :root { 
        --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; 
        --kor-color: #b45309; /* 국어 테마색 */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

    /* 좌측 사이드바 */
    .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
    .sidebar-header { padding: 30px 20px; font-size: 1.5rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: #60a5fa; }
    .subject-list { flex: 1; padding: 20px 0; }
    .subject-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; opacity: 0.6; }
    .subject-item:hover { background: rgba(255,255,255,0.05); opacity: 1; }
    .subject-item.active { opacity: 1; background: var(--primary); font-weight: bold; }

    /* 메인 영역 */
    .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; }
    
    /* 국어 전용 회차 선택바 (국어 탭일 때만 보임) */
    .nav-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .nav-btn { 
        padding: 8px 18px; border: 2px solid var(--kor-color); background: white; 
        color: var(--kor-color); border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 0.85rem; 
    }
    .nav-btn.active { background: var(--kor-color); color: white; }

    /* 파일이 담기는 상자 */
    .frame-box { flex: 1; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    
    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">STUDY MAX</div>
    <div class="subject-list">
        <div id="side-korean" class="subject-item active" onclick="switchSubject('korean')">📖 국어 (모의고사)</div>
        <div id="side-climate" class="subject-item" onclick="switchSubject('climate')">🌍 사회 (기후/지리)</div>
        <div id="side-history" class="subject-item" onclick="switchSubject('history')">📚 한국사 (인터랙티브)</div>
        <div id="side-info" class="subject-item" onclick="switchSubject('info')">💻 정보 (알고리즘)</div>
    </div>
</div>

<div class="main-content">
    <div id="kor-nav" class="nav-bar">
        <button class="nav-btn active" onclick="loadKor(1, this)">제1회</button>
        <button class="nav-btn" onclick="loadKor('2_3', this)">제2·3회</button>
        <button class="nav-btn" onclick="loadKor(4, this)">제4회</button>
    </div>

    <div class="frame-box">
        <iframe id="mainFrame" src="./korean_set1.html"></iframe>
    </div>
</div>

<script>
    // 과목 전환 (파일 경로만 바꿈)
    function switchSubject(subject) {
        document.querySelectorAll('.subject-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`side-${subject}`).classList.add('active');
        
        const frame = document.getElementById('mainFrame');
        const korNav = document.getElementById('kor-nav');

        // 국어일 때만 회차 메뉴 보이기
        korNav.classList.add('hidden');

        if(subject === 'korean') {
            korNav.classList.remove('hidden');
            frame.src = "./korean_set1.html";
        } else if(subject === 'climate') {
            frame.src = "./climate_interactive.html";
        } else if(subject === 'history') {
            frame.src = "./history_interactive.html";
        } else if(subject === 'info') {
            frame.src = "./mega_study.html";
        }
    }

    // 국어 회차 변경
    function loadKor(num, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mainFrame').src = `./korean_set${num}.html`;
    }

    // 초기 실행
    window.onload = () => switchSubject('korean');
</script>
</body>
</html>
