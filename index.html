<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY MAX FINAL — 기말고사 학습 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020617;
        --primary: #3b82f6;
        --secondary: #06b6d4;
        --text-muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Pretendard', sans-serif;
        min-height: 100vh;
        background:
            radial-gradient(circle at 20% 20%, rgba(59,130,246,.24), transparent 38%),
            radial-gradient(circle at 80% 0%, rgba(6,182,212,.18), transparent 35%),
            linear-gradient(135deg, #020617 0%, #0f172a 60%, #111827 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
    }
    .intro-card {
        width: min(920px, 100%);
        border: 1px solid rgba(148,163,184,.25);
        background: rgba(15,23,42,.62);
        backdrop-filter: blur(6px);
        border-radius: 24px;
        padding: 42px;
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .badge { display: inline-block; padding: 8px 14px; border-radius: 999px; background: rgba(59,130,246,.2); color: #bfdbfe; font-size: .86rem; font-weight: 700; }
    h1 { margin-top: 18px; font-size: clamp(2.2rem, 5vw, 4rem); line-height: 1.08; letter-spacing: -1px; }
    .lead { margin-top: 14px; color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; max-width: 680px; }
    .highlights { margin-top: 26px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .highlights li { list-style: none; border: 1px solid rgba(148,163,184,.25); border-radius: 14px; padding: 14px 16px; color: #dbeafe; font-size: .95rem; }
    .actions { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
        text-decoration: none; font-weight: 700; border-radius: 12px; padding: 14px 22px; transition: .2s;
    }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-ghost { border: 1px solid rgba(148,163,184,.35); color: #cbd5e1; }
    .credits { margin-top: 28px; color: #94a3b8; font-size: .84rem; line-height: 1.7; }
    @media (max-width: 768px) {
        .intro-card { padding: 28px; }
        .highlights { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>
    <section class="intro-card">
        <span class="badge">2026 1학기 기말 대비</span>
        <h1>STUDY MAX FINAL</h1>
        <p class="lead">기말고사 범위를 빠르게 정리하고, 과목별 핵심 필기와 문제풀이를 한 곳에서 관리하는 통합 학습 포털입니다.</p>
        <ul class="highlights">
            <li>📌 과목별 시험 범위 정리</li>
            <li>📝 핵심 필기 & 오답 복습</li>
            <li>⏱️ D-day 기준 학습 동선</li>
        </ul>
        <div class="actions">
            <a href="./portal.html" class="btn btn-primary">기말 학습 시작하기</a>
            <a href="./history_interactive.html" class="btn btn-ghost">한국사 핵심 바로가기</a>
        </div>
        <div class="credits">
            PROJECT BY 심규원 · 최시원<br>
            SPECIAL THANKS TO 사회: 김현준, 이인호 / 과학: 이호
        </div>
    </section>
</body>
</html>
