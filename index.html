<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 멋진 웹사이트</title>
    <style>
        /* CSS: 디자인 담당 */
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 1rem;
            display: inline-block;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        .links a {
            display: block;
            text-decoration: none;
            background: #007bff;
            color: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            transition: 0.3s;
        }
        .links a:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .wildcard-section {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-img"></div> <h1>반갑습니다! 👋</h1>
    <p>저의 GitHub Pages 공간에 오신 것을 환영합니다.</p>
    
    <div class="links">
        <a href="https://github.com" target="_blank">나의 GitHub</a>
        <a href="https://blog.naver.com" target="_blank">개인 블로그</a>
        <a href="mailto:example@email.com">이메일 보내기</a>
    </div>

    <div class="wildcard-section">
        오늘의 행운의 메시지: "시작이 반이다!"
    </div>
</div>

<script>
    // JavaScript: 간단한 상호작용
    console.log("웹사이트가 성공적으로 로드되었습니다!");
</script>

</body>
</html>
