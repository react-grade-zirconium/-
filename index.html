<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 학습 포털 MAX (전과목)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
    :root {
        --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; --card: #ffffff;
        --info-color: #0d9488; --korean-color: #b45309; --climate-color: #f59e0b;
        --tropical: #f59e0b; --dry: #ef4444; --temperate: #22c55e; --cold: #3b82f6; --polar: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--dark); display: flex; min-height: 100vh; overflow: hidden; }

    /* 사이드바 */
    .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; z-index: 1000; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
    .sidebar-header { padding: 30px 20px; font-size: 1.6rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: #60a5fa; }
    .subject-list { flex: 1; padding: 20px 0; }
    .subject-item { padding: 16px 25px; cursor: pointer; transition: 0.3s; opacity: 0.7; display: flex; align-items: center; gap: 12px; }
    .subject-item:hover { background: rgba(255,255,255,0.05); }
    .subject-item.active { opacity: 1; background: var(--primary); font-weight: bold; }

    /* 메인 컨텐츠 영역 */
    .main-content { flex: 1; padding: 30px; height: 100vh; overflow-y: auto; }
    .subject-title { font-size: 2rem; font-weight: 800; margin-bottom: 20px; border-left: 8px solid var(--primary); padding-left: 18px; }

    /* 국어 회차 선택 메뉴 */
    .exam-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .exam-btn { 
        padding: 10px 20px; border: 2px solid var(--korean-color); background: white; 
        color: var(--korean-color); border-radius: 30px; cursor: pointer; font-weight: 800; transition: 0.2s;
    }
    .exam-btn:hover, .exam-btn.active { background: var(--korean-color); color: white; }

    /* 프레임 스타일 */
    .frame-container { width: 100%; height: calc(100vh - 180px); border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    iframe { width: 100%; height: 100%; border: none; }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">STUDY MAX</div>
    <div class="subject-list">
        <div id="side-korean" class="subject-item active" onclick="switchSubject('korean')">📖 <span>국어 (모의고사)</span></div>
        <div id="side-climate" class="subject-item" onclick="switchSubject('climate')">🌍 <span>사회 (기후/지리)</span></div>
        <div id="side-history" class="subject-item" onclick="switchSubject('history')">📚 <span>한국사 (인터랙티브)</span></div>
        <div id="side-info" class="subject-item" onclick="switchSubject('info')">💻 <span>정보 (알고리즘)</span></div>
    </div>
</div>

<div class="main-content">
    <h1 id="main-title" class="subject-title" style="border-left-color: var(--korean-color);">국어 서정 시 모의고사</h1>

    <div id="content-korean">
        <div class="exam-nav">
            <button class="exam-btn active" onclick="loadKorean(1, this)">제1회차 (세트1)</button>
            <button class="exam-btn" onclick="loadKorean('2_3', this)">제2·3회차 (세트2-3)</button>
            <button class="exam-btn" onclick="loadKorean(4, this)">제4회차 (세트4)</button>
            <button class="exam-btn" onclick="loadKorean(5, this)">제5회차 (예정)</button>
        </div>
        <div class="frame-container">
            <iframe id="koreanFrame" src="./korean_set1.html"></iframe>
        </div>
    </div>

    <div id="content-climate" class="hidden">
        <div class="frame-container" style="height: calc(100vh - 120px);">
            <div id="cli-concept">내용을 불러오는 중...</div>
        </div>
    </div>

    <div id="content-history" class="hidden" style="height: calc(100vh - 120px);">
        <iframe src="./history_interactive.html"></iframe>
    </div>

    <div id="content-info" class="hidden" style="height: calc(100vh - 120px);">
        <iframe src="./mega_study.html"></iframe>
    </div>
</div>

<script src="./climate.js"></script>

<script>
    // 과목 전환 로직
    function switchSubject(subject) {
        document.querySelectorAll('.subject-item').forEach(el => el.classList.remove('active'));
        ['korean', 'climate', 'history', 'info'].forEach(s => document.getElementById(`content-${s}`).classList.add('hidden'));

        const title = document.getElementById('main-title');
        document.getElementById(`side-${subject}`).classList.add('active');
        document.getElementById(`content-${subject}`).classList.remove('hidden');

        if(subject === 'korean') {
            title.innerText = "국어 서정 시 모의고사";
            title.style.borderLeftColor = 'var(--korean-color)';
        } else if(subject === 'climate') {
            title.innerText = "사회 (기후와 인간 생활)";
            title.style.borderLeftColor = 'var(--climate-color)';
        } else if(subject === 'history') {
            title.innerText = "한국사 인터랙티브 학습";
            title.style.borderLeftColor = 'var(--primary)';
        } else if(subject === 'info') {
            title.innerText = "정보 (알고리즘 및 프로그래밍)";
            title.style.borderLeftColor = 'var(--info-color)';
        }
    }

    // 국어 회차 변경 로직
    function loadKorean(num, btn) {
        document.querySelectorAll('.exam-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('koreanFrame').src = `./korean_set${num}.html`;
    }

    // 초기화
    window.onload = () => {
        if(window.climateSummaryHTML) document.getElementById('cli-concept').innerHTML = window.climateSummaryHTML;
        switchSubject('korean');
    };
</script>
</body>
</html>
