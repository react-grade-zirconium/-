<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY MAX — 통합 학습 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #2563eb;
        --dark: #0f172a;
        --accent: #60a5fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Pretendard', sans-serif;
        background-color: var(--dark);
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    /* 배경 효과 */
    .bg-gradient {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
        z-index: -1;
    }

    .container {
        text-align: center;
        padding: 20px;
        animation: fadeIn 1.5s ease-out;
        z-index: 10;
    }

    .logo-text {
        font-size: 5rem;
        font-weight: 900;
        letter-spacing: -2px;
        background: linear-gradient(to right, #ffffff, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
    }

    .sub-text {
        font-size: 1.2rem;
        color: #94a3b8;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .start-btn {
        margin-top: 40px;
        padding: 18px 45px;
        font-size: 1.1rem;
        font-weight: 700;
        color: white;
        background: var(--primary);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
        display: inline-block;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }

    .start-btn:hover {
        transform: translateY(-5px);
        background: #1d4ed8;
        box-shadow: 0 15px 35px rgba(37, 99, 235, 0.5);
    }

    /* 🔥 하단 크레딧 스타일 */
    .credits {
        position: absolute;
        bottom: 40px;
        text-align: center;
        font-size: 0.85rem;
        color: #64748b;
        line-height: 1.8;
        animation: fadeIn 2s ease-out;
    }

    .credits .role {
        font-weight: 900;
        color: var(--accent);
        margin-right: 8px;
        letter-spacing: 1px;
    }

    .credits .name {
        color: #e2e8f0;
        margin-right: 25px;
    }

    .credits .name:last-child {
        margin-right: 0;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
        .logo-text { font-size: 3rem; }
        .credits { font-size: 0.75rem; bottom: 20px; }
    }
</style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="container">
        <div class="logo-area">
            <h1 class="logo-text">STUDY MAX</h1>
            <p class="sub-text">Ultimate Learning Portal System</p>
        </div>

        <a href="./portal.html" class="start-btn">학습 시작하기</a>
    </div>

    <div class="credits">
        <span><span class="role">PROJECT BY</span> <span class="name">심규원 : 국어, 수학, 물리, 화학, 지구과학, 한국사, 최시원 : 사회, 지리, 생물, 자료 정리</span></span>
        <span><span class="role">SPECIAL THANKS TO</span> <span class="name">사회 - 김현준, 이인호, 과학 - 이호</span></span>
    </div>

</body>
</html>
