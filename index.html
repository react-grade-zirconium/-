<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY MAX — 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

    /* 사이드바 */
    .sidebar { width: 250px; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
    .sidebar-header { padding: 30px 20px; font-size: 1.5rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: #60a5fa; }
    
    .subject-list { flex: 1; padding: 20px 0; }
    .subject-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; opacity: 0.6; display: flex; align-items: center; gap: 12px; }
    .subject-item:hover { background: rgba(255,255,255,0.05); opacity: 1; }
    .subject-item.active { opacity: 1; background: var(--primary); font-weight: bold; }

    /* 🏠 메인으로 돌아가기 버튼 (사이드바 하단) */
    .sidebar-footer {
        padding: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }
    .home-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px;
        background: rgba(255,255,255,0.1);
        color: #94a3b8;
        text-decoration: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 700;
        transition: 0.3s;
    }
    .home-btn:hover {
        background: #ef4444; /* 나갈 때는 살짝 붉은색 포인트 */
        color: white;
    }

    /* 메인 영역 */
    .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 100vh; }
    .frame-box { flex: 1; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">STUDY MAX</div>
    
    <div class="subject-list">
        <div id="side-korean" class="subject-item active" onclick="go('korean_hub.html', this)">📖 국어 모의고사</div>
        <div id="side-science" class="subject-item" onclick="go('science_hub.html', this)">🧪 통합과학</div>
        <div id="side-climate" class="subject-item" onclick="go('climate_interactive.html', this)">🌍 사회 (기후)</div>
        <div id="side-history" class="subject-item" onclick="go('history_interactive.html', this)">📚 한국사</div>
        <div id="side-info" class="subject-item" onclick="go('mega_study.html', this)">💻 정보 (알고리즘)</div>
    </div>

    <div class="sidebar-footer">
        <a href="./index.html" class="home-btn">
            <span>🏠</span> 인트로 화면으로
        </a>
    </div>
</div>

<div class="main-content">
    <div class="frame-box">
        <iframe id="mainFrame" src="./korean_hub.html"></iframe>
    </div>
</div>

<script>
    function go(url, el) {
        document.querySelectorAll('.subject-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('mainFrame').src = "./" + url;
    }
</script>
</body>
</html>
