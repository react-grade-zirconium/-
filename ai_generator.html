<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY MAX - AI 무한 문제 생성기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ai: #8b5cf6; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 30px; color: #1e293b; margin: 0; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 2rem; font-weight: 900; color: var(--ai); margin: 0; }
        .ai-box { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15); overflow: hidden; border: 1px solid #ddd6fe; }
        .control-panel { padding: 20px; background: #f5f3ff; border-bottom: 1px solid #ddd6fe; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        select, button { padding: 12px 18px; font-size: 1rem; border-radius: 10px; border: 1px solid #c4b5fd; font-weight: bold; outline: none; }
        select { background: white; color: #4c1d95; cursor: pointer; min-width: 150px; }
        .btn-main { background: var(--ai); color: white; border: none; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { background: #7c3aed; transform: translateY(-2px); }
        .problem-area { padding: 40px 30px; text-align: center; min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .subject-badge { display: inline-block; padding: 4px 12px; background: #ede9fe; color: #7c3aed; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 15px; }
        .problem-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 25px; color: #1e293b; line-height: 1.6; word-break: keep-all; }
        .answer-area { display: none; justify-content: center; gap: 10px; margin-top: 20px; width: 100%; }
        .answer-area input { padding: 12px; font-size: 1.1rem; width: 250px; text-align: center; border: 2px solid #e2e8f0; border-radius: 10px; }
        .answer-area input:focus { border-color: var(--ai); outline: none; }
        .options-area { display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 550px; margin-top: 10px; }
        .option-btn { padding: 15px 20px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: left; font-size: 1.05rem; transition: 0.2s; font-weight: bold; color: #334155; }
        .option-btn:hover { border-color: var(--ai); background: #f5f3ff; color: var(--ai); transform: translateX(5px); }
        .feedback { margin-top: 25px; font-weight: bold; font-size: 1.1rem; min-height: 24px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .correct { color: #10b981; }
        .wrong { color: #ef4444; }
        .empty { color: #f97316; } 
        .next-btn { padding: 10px 25px; background: #1e293b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: bold; animation: slideUp 0.3s ease; }
        .next-btn:hover { background: #334155; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--ai); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .enter-hint { font-size: 0.8rem; color: #94a3b8; margin-top: -5px; animation: slideUp 0.3s ease; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🤖 AI MULTI-GENERATOR</h1>
    </div>

    <div class="ai-box">
        <div class="control-panel">
            <select id="subjectSelect">
                <option value="korean">📖 통합국어 (시/대화)</option>
                <option value="science">🧪 통합과학 (물/화/생/지)</option>
                <option value="society">🌍 통합사회 (행복/지리)</option>
                <option value="info">💻 정보/알고리즘</option>
            </select>
            <button class="btn-main" onclick="this.blur(); generate();">문제 생성하기 ⚡</button>
        </div>

        <div class="problem-area">
            <div id="loader" class="loader"></div>
            <div id="contentBox">
                <div id="subjectBadge" class="subject-badge" style="display:none;"></div>
                <div id="problemText" class="problem-text" style="color: #94a3b8;">과목을 선택하고 버튼을 누르세요.</div>
                
                <div id="interactionArea" class="answer-area">
                    <input type="text" id="userAnswer" placeholder="정답 입력 (단답형/OX)">
                    <button onclick="this.blur(); check();" style="background: #10b981; color: white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">확인</button>
                </div>

                <div id="optionsArea" class="options-area"></div>

                <div id="feedbackText" class="feedback"></div>
            </div>
        </div>
    </div>

<script>
    let curAns = "";
    let isMultiple = false;
    let isWaitingForNext = false; 

    // 엔터키 전역 감지 (기본 동작 완벽 차단)
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            e.preventDefault(); // 중요: 엔터키로 인해 기존 버튼이 눌리는 현상 원천 차단
            
            if(isWaitingForNext) { 
                generate(); 
            } else { 
                check(); 
            }
        }
    });

    function generate() {
        isWaitingForNext = false; 
        const sub = document.getElementById('subjectSelect').value;
        const badge = document.getElementById('subjectBadge');
        const txt = document.getElementById('problemText');
        const loader = document.getElementById('loader');
        const area = document.getElementById('interactionArea');
        const optArea = document.getElementById('optionsArea');
        const feedback = document.getElementById('feedbackText');

        area.style.display = 'none';
        optArea.style.display = 'none';
        badge.style.display = 'none';
        feedback.innerHTML = '';
        txt.innerText = '';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            let qData = {};

            const bank = {
                korean: [
                    // 기존 문제 리스트 
                    { type: 'ox', q: "[OX퀴즈] 공손성의 원리 중 '자신을 낮추고 겸손하게 말하는 것'은 찬동의 격률이다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 체면은 사회 구성원이 타인에게 인정받고 싶어 하는 동시에 간섭받지 않기를 원하는 공개적 자아이다. (O / X 로 입력)", a: "O" },
                    { type: 'ox', q: "[OX퀴즈] 협력의 원리 중 '질의 격률'은 모호하거나 중의적인 표현을 피하고 명료하게 말하라는 뜻이다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 공손성의 원리 중 '동의의 격률'은 상대방과 자신의 의견 차이를 최소화하고 일치점을 극대화하는 것이다. (O / X 로 입력)", a: "O" },
                    { type: 'ox', q: "[OX퀴즈] 시에서 말하는 사람을 '화자'라고 부르며, 화자는 반드시 시인 자신과 일치한다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 뉴미디어는 신문, TV 방송 등 소수의 생산자가 대중에게 일방적으로 정보를 전달하는 매체이다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 공손성의 원리 중 '관용의 격률'은 화자 자신의 부담을 최대화하고 이익을 최소화하는 것이다. (O / X 로 입력)", a: "O" },
                    { type: 'ox', q: "[OX퀴즈] '요령의 격률'은 청자의 부담을 최대화하고 혜택을 최소화하라는 규칙이다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 그라이스(Grice)의 협력의 원리는 요령, 관용, 찬동, 겸양, 동의의 격률로 나뉜다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 은유법은 '~처럼', '~같이', '~듯이' 등의 연결어를 사용하여 두 대상을 직접 빗대어 표현하는 방법이다. (O / X 로 입력)", a: "X" },
                    { type: 'ox', q: "[OX퀴즈] 객관적 상관물은 화자의 감정을 간접적으로 환기하거나 표현하기 위해 시에 등장시키는 사물이나 자연물이다. (O / X 로 입력)", a: "O" },
                    
                    { type: 'short', q: "[단답형] 상대방의 부담을 최소화하고 이익을 극대화하는 공손성의 격률은?", a: "요령" },
                    { type: 'short', q: "[단답형] 화자 자신의 부담을 높이고 이익을 줄이는 공손성의 격률은 무엇인가요?", a: "관용" },
                    { type: 'short', q: "[단답형] 상대방을 비방하는 표현을 최소화하고 칭찬을 극대화하는 공손성의 격률은?", a: "찬동" },
                    { type: 'short', q: "[단답형] 화자 자신의 칭찬을 최소화하고 자신을 한껏 낮추어 말하는 공손성의 격률은?", a: "겸양" },
                    { type: 'short', q: "[단답형] 대화의 주제나 목적과 관련된 내용만 말해야 한다는 협력의 원리는 '□□성의 격률'이다.", a: "관련" },
                    { type: 'short', q: "[단답형] 시에서 화자의 감정을 다른 대상에 옮겨 넣어, 마치 그 대상이 화자와 같은 감정을 느끼는 것처럼 표현하는 방법은?", a: "감정이입" },
                    { type: 'short', q: "[단답형] 대화의 원리 중, 대화 참여자들이 서로 협력하여 원활하게 의사소통을 하려 한다는 원리는 '□□의 원리'이다.", a: "협력" },
                    { type: 'short', q: "[단답형] 타당한 근거를 바탕으로 진실만을 말하라는 협력의 원리 격률은?", a: "질" },
                    { type: 'short', q: "[단답형] \"A는 B이다\"의 형태로 원관념과 보조관념을 숨겨서 비유하는 수사법은?", a: "은유법" },
                    { type: 'short', q: "[단답형] 겉으로는 칭찬하는 척하지만 속으로는 반대의 의미를 담아 비꼬는 표현 방법은?", a: "반어법" },
                    { type: 'short', q: "[단답형] 겉보기에는 논리적으로 모순되지만, 그 속에 삶의 깊은 진리를 담고 있는 표현 방법은?", a: "역설법" },

                    { type: 'multi', q: "[5지선다] 대화 중 모호하거나 중의적인 표현을 피하고, 간결하고 조리 있게 말해야 한다는 협력의 원리는?", opts: ["① 양의 격률", "② 질의 격률", "③ 관련성의 격률", "④ 태도의 격률", "⑤ 요령의 격률"], a: "④ 태도의 격률" },
                    { type: 'multi', q: "[5지선다] 다음 중 '요령의 격률'을 가장 잘 지킨 대화 방식은?", opts: ["① 너 당장 이것 좀 복사해 와.", "② 내가 할 테니 너는 쉬어.", "③ 넌 정말 똑똑하구나!", "④ 시간이 괜찮으시면 이것 좀 도와주실 수 있나요?", "⑤ 아니, 그건 네 생각이 틀렸어."], a: "④ 시간이 괜찮으시면 이것 좀 도와주실 수 있나요?" },
                    { type: 'multi', q: "[5지선다] 다음 중 '겸양의 격률'을 잘 보여주는 표현은?", opts: ["① 역시 넌 최고의 친구야.", "② 제가 아직 많이 부족해서 그렇습니다.", "③ 내 의견도 좋지만 네 의견부터 듣자.", "④ 네 말이 맞아, 근데 내 생각은 조금 달라.", "⑤ 제가 직접 도와드리겠습니다."], a: "② 제가 아직 많이 부족해서 그렇습니다." },
                    { type: 'multi', q: "[5지선다] 시에서 대상에 인격적 요소를 부여하여 사람처럼 표현하는 수사법은?", opts: ["① 직유법", "② 은유법", "③ 의인법", "④ 대구법", "⑤ 반어법"], a: "③ 의인법" },
                    { type: 'multi', q: "[5지선다] \"소리 없는 아우성\"이라는 구절에 쓰인 수사법은?", opts: ["① 직유법", "② 은유법", "③ 역설법", "④ 반어법", "⑤ 도치법"], a: "③ 역설법" },
                    { type: 'multi', q: "[5지선다] 시의 화자에 대한 설명으로 옳은 것은?", opts: ["① 시인과 항상 동일한 인물이다.", "② 시 속에서 시인을 대신하여 말하는 허구적 대리인이다.", "③ 화자는 항상 시의 표면에 '나'로 명시되어 나타난다.", "④ 시의 주제와 화자는 아무런 관련이 없다.", "⑤ 독자는 화자의 성별이나 나이를 절대 추측할 수 없다."], a: "② 시 속에서 시인을 대신하여 말하는 허구적 대리인이다." },
                    { type: 'multi', q: "[5지선다] 무생물이나 동식물에 생명력(사람의 행동이나 감정 제외)을 불어넣어 살아있는 것처럼 표현하는 수사법은?", opts: ["① 활유법", "② 의인법", "③ 대유법", "④ 영탄법", "⑤ 설의법"], a: "① 활유법" },
                    { type: 'multi', q: "[5지선다] 다음 중 '직유법'이 쓰인 구절은?", opts: ["① 내 마음은 호수요.", "② 찬란한 슬픔의 봄", "③ 구름에 달 가듯이 가는 나그네", "④ 님이여, 당신은 백 번이나 단련한 금이십니다.", "⑤ 소리 없는 아우성"], a: "③ 구름에 달 가듯이 가는 나그네" },
                    { type: 'multi', q: "[5지선다] \"어제 산 책 어때?\"라는 질문에 \"책갈피 디자인이 예쁘고, 종이 재질이 참 부드러워.\"라고 대답했다면, 어떤 격률을 어긴 것인가?", opts: ["① 양의 격률", "② 질의 격률", "③ 관련성의 격률", "④ 요령의 격률", "⑤ 관용의 격률"], a: "③ 관련성의 격률" }
                ],
                science: [
                    { type: 'ox', q: "[OX퀴즈] 전자기파는 매질이 없어도 진공 상태에서 전파될 수 있다. (O / X 로 입력)", a: "O" },
                    { type: 'short', q: "[단답형] 지구 시스템 중 암석과 토양으로 이루어진 영역의 이름은?", a: "지권" },
                    { type: 'multi', q: "[5지선다] 다음 중 세포 내에서 생명 활동을 조절하고 유전 정보를 저장하는 핵심 소기관은?", opts: ["① 리보솜", "② 골지체", "③ 엽록체", "④ 핵", "⑤ 미토콘드리아"], a: "④ 핵" },
					{ type: 'multi', q: "[5지선다] 주기율표의 왼쪽과 가운데에 위치하며, 전자를 잃고 양이온이 되기 쉬운 원소 그룹은?", opts: ["① 금속 원소", "② 비금속 원소", "③ 비활성 기체", "④ 할로젠", "⑤ 준금속"], a: "① 금속 원소" },
					{ type: 'ox', q: "[OX퀴즈] 미토콘드리아는 세포 호흡을 통해 생명 활동에 필요한 에너지인 ATP를 생성한다. (O / X 로 입력)", a: "O" },
					{ type: 'short', q: "[단답형] 연속적인 물리량의 변화를 담고 있는 자연계의 신호를 무엇이라고 하는가?", a: "아날로그 신호" },
					{ type: 'multi', q: "[5지선다] 빅뱅 후 약 38만 년이 지나 우주의 온도가 3,000K일 때 퍼져 나간 빛의 흔적은?", opts: ["① 적색 편이", "② 우주 배경 복사", "③ 성운", "④ 초신성", "⑤ 중력파"], a: "② 우주 배경 복사" },
					{ type: 'ox', q: "[OX퀴즈] 알칼리 금속은 밀도가 물보다 커서 물에 넣으면 가라앉는다. (O / X 로 입력)", a: "X" },
					{ type: 'short', q: "[단답형] 할로젠 원소 중 실온에서 유일하게 적갈색 액체 상태로 존재하는 원소의 기호는?", a: "BR" },
					{ type: 'multi', q: "[5지선다] 단백질의 기본 단위인 아미노산들이 결합할 때 물 분자가 빠져나오며 형성되는 결합은?", opts: ["① 이온 결합", "② 수소 결합", "③ 펩타이드 결합", "④ 금속 결합", "⑤ 당 결합"], a: "③ 펩타이드 결합" },

					{ type: 'ox', q: "[OX퀴즈] 파밍(Pharming) 피해를 예방하려면 주소창에 자물쇠 모양(HTTPS)이 있는지 반드시 확인해야 한다. (O / X 로 입력)", a: "O" },

					{ type: 'ox', q: "[OX퀴즈] 블록체인에서 거래 내역이 담긴 블록들이 시간 순서대로 연결된 것을 분산 원장이라고 한다. (O / X 로 입력)", a: "O" },
					{ type: 'short', q: "[단답형] 정렬 방식 중 특정 위치의 데이터를 앞부분과 비교하며 '끼워 넣는' 방식의 영어 명칭은?", a: "INSERTION SORT" },
					{ type: 'multi', q: "[5지선다] 크루스칼 알고리즘과 프림 알고리즘의 공통적인 알고리즘 설계 전략은 무엇인가?", opts: ["① 분할 정복", "② 동적 계획법", "③ 탐욕(Greedy) 알고리즘", "④ 백트래킹", "⑤ 이진 탐색"], a: "③ 탐욕(Greedy) 알고리즘" },

					{ type: 'short', q: "[단답형] 블록체인에서 새로운 블록을 생성하기 위해 복잡한 연산을 수행하고 보상을 받는 행위는?", a: "채굴" },
					{ type: 'multi', q: "[5지선다] 삽입 정렬이 수행될 때, n번째 단계가 끝나면 보장되는 결과는?", opts: ["① 전체가 정렬된다", "② 가장 큰 값이 뒤로 간다", "③ 가장 작은 값이 앞으로 간다", "④ 앞의 n개 요소들은 서로 정렬된 상태가 된다", "⑤ 중간값이 결정된다"], a: "④ 앞의 n개 요소들은 서로 정렬된 상태가 된다" },
					{ type: 'ox', q: "[OX퀴즈] 최소 신장 트리(MST)는 정점의 개수가 V개일 때 간선의 개수가 V-1개인 트리 형태를 띤다. (O / X 로 입력)", a: "O" },

					{ type: 'multi', q: "[5지선다] 블록체인의 4대 구성 요소가 아닌 것은?", opts: ["① P2P 네트워크", "② 암호화 기술", "③ 분산 장부", "④ 중앙 제어 기관", "⑤ 합의 알고리즘"], a: "④ 중앙 제어 기관" },
					{ type: 'ox', q: "[OX퀴즈] 삽입 정렬은 이미 정렬된 데이터에 새로운 데이터를 추가하여 다시 정렬할 때 효율적이다. (O / X 로 입력)", a: "O" },
					{ type: 'short', q: "[단답형] 프림 알고리즘은 하나의 ( )에서 시작하여 점진적으로 트리를 확장하는 방식이다. 빈칸은?", a: "정점" },
					{ type: 'multi', q: "[5지선다] 정보 보안 사고 발생 시, 인가된 사람만이 데이터에 접근할 수 있도록 보장하는 성질은?", opts: ["① 가용성", "② 무결성", "③ 기밀성", "④ 투명성", "⑤ 확장성"], a: "③ 기밀성" }
                ]
            };

            const selectedPool = bank[sub];
            qData = selectedPool[Math.floor(Math.random() * selectedPool.length)];
            
            const subjectNames = { korean: "📖 통합국어", science: "🧪 통합과학", society: "🌍 통합사회", info: "💻 정보" };
            badge.innerText = subjectNames[sub];
            badge.style.display = 'inline-block';
            txt.innerText = qData.q;
            curAns = qData.a;

            if(qData.type === 'multi') {
                isMultiple = true;
                optArea.innerHTML = '';
                qData.opts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => check(opt); 
                    optArea.appendChild(btn);
                });
                optArea.style.display = 'flex';
            } else {
                isMultiple = false;
                area.style.display = 'flex';
                document.getElementById('userAnswer').value = "";
                document.getElementById('userAnswer').focus();
            }
        }, 300); 
    }

    function check(val) {
        if(isWaitingForNext) return; 

        let user = "";
        if (isMultiple) {
            user = val || ""; 
        } else {
            user = document.getElementById('userAnswer').value.trim().toUpperCase(); 
        }

        const f = document.getElementById('feedbackText');
        
        if (user === "") {
            f.innerHTML = `<span class="empty">⚠️ 답을 선택하거나 입력하지 않았습니다. (정답: ${curAns})</span>
                           <button class="next-btn" onclick="this.blur(); generate();">정답 확인 (다음 문제) ⚡</button>
                           <div class="enter-hint">(Enter 키를 누르면 다음 문제로 넘어갑니다)</div>`;
        } 
        else if(user === curAns.toUpperCase()) {
            f.innerHTML = `<span class="correct">✅ 정답입니다! 아주 훌륭해요.</span>
                           <button class="next-btn" onclick="this.blur(); generate();">다음 문제 생성 ⚡</button>
                           <div class="enter-hint">(Enter 키를 누르면 다음 문제로 넘어갑니다)</div>`;
        } 
        else {
            f.innerHTML = `<span class="wrong">❌ 틀렸습니다. (정답: ${curAns})</span>
                           <button class="next-btn" onclick="this.blur(); generate();">다른 문제 도전 ⚡</button>
                           <div class="enter-hint">(Enter 키를 누르면 다음 문제로 넘어갑니다)</div>`;
        }

        setTimeout(() => { isWaitingForNext = true; }, 100);
    }
</script>
