<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY MAX - 통합 AI 문제 생성기</title>
<style>
    :root { --ai: #8b5cf6; --bg: #f8fafc; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 30px; color: #1e293b; margin: 0; }
    
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 { font-size: 2rem; font-weight: 900; color: var(--ai); margin: 0; }
    
    .ai-box { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15); overflow: hidden; border: 1px solid #ddd6fe; }
    
    .control-panel { padding: 20px; background: #f5f3ff; border-bottom: 1px solid #ddd6fe; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    select, button { padding: 12px 18px; font-size: 1rem; border-radius: 10px; border: 1px solid #c4b5fd; font-weight: bold; outline: none; }
    select { background: white; color: #4c1d95; cursor: pointer; min-width: 150px; }
    button { background: var(--ai); color: white; border: none; cursor: pointer; transition: 0.2s; }
    button:hover { background: #7c3aed; transform: translateY(-2px); }

    .problem-area { padding: 50px 30px; text-align: center; min-height: 250px; }
    .subject-badge { display: inline-block; padding: 4px 12px; background: #ede9fe; color: #7c3aed; border-radius: 20px; font-size: 0.85rem; font-weight: 800; margin-bottom: 15px; }
    .problem-text { font-size: 1.4rem; font-weight: 800; margin-bottom: 25px; color: #1e293b; line-height: 1.6; word-break: keep-all; }
    
    .answer-area { display: none; justify-content: center; gap: 10px; margin-top: 20px; }
    .answer-area input { padding: 12px; font-size: 1.1rem; width: 160px; text-align: center; border: 2px solid #e2e8f0; border-radius: 10px; }
    .answer-area input:focus { border-color: var(--ai); outline: none; }
    
    .feedback { margin-top: 20px; font-weight: bold; font-size: 1.1rem; min-height: 24px; }
    .correct { color: #10b981; }
    .wrong { color: #ef4444; }

    .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--ai); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

    <div class="header">
        <h1>🤖 AI MULTI-GENERATOR</h1>
    </div>

    <div class="ai-box">
        <div class="control-panel">
            <select id="subjectSelect">
                <option value="science">🧪 통합과학 (물/화/생/지)</option>
                <option value="society">🌍 통합사회 (행복/지리)</option>
                <option value="info">💻 정보/알고리즘</option>
            </select>
            <button onclick="generate()">문제 생성하기 ⚡</button>
        </div>

        <div class="problem-area">
            <div id="loader" class="loader"></div>
            <div id="contentBox">
                <div id="subjectBadge" class="subject-badge" style="display:none;"></div>
                <div id="problemText" class="problem-text" style="color: #94a3b8;">과목을 선택하고 버튼을 누르세요.</div>
                
                <div id="interactionArea" class="answer-area">
                    <input type="text" id="userAnswer" placeholder="정답 입력" onkeypress="if(event.key==='Enter') check()">
                    <button onclick="check()" style="background: #10b981;">확인</button>
                </div>
                <div id="feedbackText" class="feedback"></div>
            </div>
        </div>
    </div>

<script>
    let curAns = "";

    function generate() {
        const sub = document.getElementById('subjectSelect').value;
        const badge = document.getElementById('subjectBadge');
        const txt = document.getElementById('problemText');
        const loader = document.getElementById('loader');
        const area = document.getElementById('interactionArea');
        const feedback = document.getElementById('feedbackText');

        // UI 초기화
        area.style.display = 'none';
        badge.style.display = 'none';
        feedback.innerText = '';
        txt.innerText = '';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            let q = "";
            let bTxt = "";

            if (sub === 'science') {
                const parts = ['물리', '화학', '생명', '지구'];
                const part = parts[Math.floor(Math.random() * parts.length)];
                bTxt = "통합과학 - " + part;
                
                if(part === '물리') {
                    let v = (Math.floor(Math.random()*5)+1)*10;
                    let t = Math.floor(Math.random()*4)+2;
                    q = `어떤 물체가 ${v}m/s의 일정한 속력으로 ${t}초 동안 이동했습니다. 총 이동 거리는 몇 m입니까?`;
                    curAns = (v * t).toString();
                } else if(part === '화학') {
                    let solute = (Math.floor(Math.random()*3)+1)*10;
                    q = `용질 ${solute}g이 녹아있는 소금물 100g이 있습니다. 이 용액의 퍼센트(%) 농도는 얼마입니까?`;
                    curAns = solute.toString();
                } else if(part === '생명') {
                    const organelles = ["핵", "미토콘드리아", "리보솜"];
                    const chosen = organelles[Math.floor(Math.random()*organelles.length)];
                    q = `세포 소기관 중 '${chosen}'의 주요 기능은 무엇입니까?\n(1.유전정보저장 2.에너지생성 3.단백질합성)\n번호로 입력하세요.`;
                    curAns = chosen === "핵" ? "1" : (chosen === "미토콘드리아" ? "2" : "3");
                } else {
                    q = `지구 시스템의 구성 요소 중 기권, 수권, 지권 중 암석과 토양으로 이루어진 영역은 무엇입니까?`;
                    curAns = "지권";
                }
            } 
            else if (sub === 'society') {
                const part = Math.random() > 0.5 ? '행복' : '지리';
                bTxt = "통합사회 - " + part;
                if(part === '행복') {
                    q = `도덕적 성찰과 실천을 통해 도달하는 동양의 행복관 중 '열반'을 강조하는 종교는?`;
                    curAns = "불교";
                } else {
                    let temp = Math.floor(Math.random()*15) - 20;
                    q = `현재 기온이 ${temp}℃인 지역에서 가장 적합한 의복은?\n(1.반팔 2.두꺼운패딩)`;
                    curAns = "2";
                }
            }
            else if (sub === 'math') {
                bTxt = "기초 수학";
                let a = Math.floor(Math.random()*9)+2;
                let b = Math.floor(Math.random()*15)+5;
                let x = Math.floor(Math.random()*10)+1;
                let c = (a * x) + b;
                q = `다음 일차방정식의 x 값을 구하세요.\n${a}x + ${b} = ${c}`;
                curAns = x.toString();
            }
            else if (sub === 'info') {
                bTxt = "정보/알고리즘";
                q = `파이썬에서 'Hello'를 출력하는 올바른 함수 이름은 무엇입니까?`;
                curAns = "print";
            }

            badge.innerText = bTxt;
            badge.style.display = 'inline-block';
            txt.innerText = q;
            area.style.display = 'flex';
            document.getElementById('userAnswer').value = "";
            document.getElementById('userAnswer').focus();
        }, 600);
    }

    function check() {
        const user = document.getElementById('userAnswer').value.trim();
        const f = document.getElementById('feedbackText');
        if(user === curAns) {
            f.innerText = "✅ 정답입니다! 완벽해요.";
            f.className = "feedback correct";
        } else {
            f.innerText = "❌ 다시 생각해보세요. (정답: " + curAns + ")";
            f.className = "feedback wrong";
        }
    }
</script>
</body>
</html>
