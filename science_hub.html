<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    :root { --sci: #0891b2; --bg: #f8fafc; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* 과학 내부 상단 메뉴 */
    .nav { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .nav-btn { 
        padding: 10px 20px; border: 2px solid var(--sci); background: white; color: var(--sci); 
        border-radius: 25px; cursor: pointer; font-weight: 800; font-size: 0.9rem; transition: 0.2s;
    }
    .nav-btn.active { background: var(--sci); color: white; }
    
    .content { flex: 1; border-radius: 12px; overflow: hidden; background: white; border: 1px solid #e2e8f0; }
    iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="nav">
    <button class="nav-btn active" onclick="load('physics.html', this)">⚡ 물리</button>
    <button class="nav-btn" onclick="load('chemistry.html', this)">🧪 화학</button>
    <button class="nav-btn" onclick="load('biology.html', this)">🧬 생명과학</button>
    <button class="nav-btn" onclick="load('earth_science.html', this)">🌌 지구과학</button>
</div>

<div class="content">
    <iframe id="sciFrame" src="./physics.html"></iframe>
</div>

<script>
    function load(url, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('sciFrame').src = "./" + url;
    }
</script>
</body>
</html>
