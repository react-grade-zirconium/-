<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>국어 학습 허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --kor-main: #b45309; --kor-bg: #fff7ed; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--kor-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 40px; gap: 20px;
            flex-wrap: wrap;
        }

        .card { 
            width: 260px; 
            height: 340px; 
            background: white; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(180, 83, 9, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            text-align: center;
            padding: 20px;
        }

        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--kor-main);
            box-shadow: 0 20px 40px rgba(180, 83, 9, 0.15);
        }

        .icon { 
            font-size: 45px; 
            margin-bottom: 15px; 
            background: #fff7ed;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .title { 
            font-size: 1.25rem; 
            font-weight: 900; 
            color: var(--kor-main); 
            margin-bottom: 10px;
            word-break: keep-all;
        }

        .desc { 
            font-size: 0.9rem; 
            color: #7c2d12; 
            line-height: 1.5;
            word-break: keep-all;
            opacity: 0.85;
            margin-bottom: 15px;
        }

        .badge {
            margin-top: auto;
            padding: 5px 12px;
            background: var(--kor-main);
            color: white;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="./korean_dialogue.html" class="card">
        <div class="icon">💬</div>
        <div class="title">대화의 원리</div>
        <div class="desc">공손성/협력의 원리 및 언어 예절 핵심 정리</div>
        <div class="badge">CONCEPT</div>
    </a>

    <a href="./korean_debate.html" class="card">
        <div class="icon">🤖</div>
        <div class="title">로봇세 토론</div>
        <div class="desc">찬반 쟁점 분석 및 토론 개요서 작성 가이드</div>
        <div class="badge">DEBATE</div>
    </a>

    <a href="./korean_literature.html" class="card">
        <div class="icon">🌸</div>
        <div class="title">문학의 이해</div>
        <div class="desc">시의 화자와 수사법, 소설의 구성 및 시점 총정리</div>
        <div class="badge">LITERATURE</div>
    </a>

    <a href="./korean_mock_exam.html" class="card">
        <div class="icon">✍️</div>
        <div class="title">모의고사 기출문제</div>
        <div class="desc">최신 모의고사 기출 문항 풀이 및 정답 확인</div>
        <div class="badge" style="background: #2563eb;">PRACTICE</div>
    </a>

</body>
</html>
