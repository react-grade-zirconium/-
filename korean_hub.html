<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>국어 학습 허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --kor-main: #b45309; --kor-bg: #fff7ed; --kor-accent: #fbbf24; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--kor-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; gap: 30px;
        }

        /* 📝 모의고사 리스트 영역 (기존 자료 2개) */
        .exam-container { width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .exam-header { font-size: 1.7rem; font-weight: 900; color: var(--kor-main); margin-bottom: 15px; padding-left: 10px; border-left: 6px solid var(--kor-main); }
        
        .exam-item { 
            background: white; padding: 25px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; color: #451a03; font-weight: 700;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(180, 83, 9, 0.08);
            border: 1px solid #ffedd5;
        }
        .exam-item:hover { background: var(--kor-main); color: white; transform: scale(1.03); }
        .exam-item .tag { font-size: 0.75rem; background: var(--kor-accent); padding: 3px 10px; border-radius: 10px; color: #451a03; font-weight: 800; }

        /* 💬 대화 파트 (사이드 카드) */
        .side-card { 
            width: 280px; height: 260px; background: #fffbeb; border-radius: 28px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; border: 2px dashed var(--kor-main);
            text-decoration: none; transition: 0.3s;
        }
        .side-card:hover { background: white; border-style: solid; transform: translateY(-5px); }
        .icon { font-size: 50px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="exam-container">
        <div class="exam-header">기본 모의고사</div>
        
        <a href="./korean_poem.html" class="exam-item">
            <span>📖 서정 시 모의고사 1회</span>
            <span class="tag">기존자료</span>
        </a>

        <a href="./korean_exam2.html" class="exam-item">
            <span>📖 서정 시 모의고사 2, 3회</span>
            <span class="tag">기존자료</span>
        </a>
    </div>

    <a href="./korean_talk.html" class="side-card">
        <div class="icon">💬</div>
        <h3 style="margin: 0; color: #b45309; font-size: 1.3rem;">대화의 원리</h3>
        <p style="font-size: 0.9rem; color: #92400e; margin-top: 10px; line-height: 1.5;">핵심 요약 노트 & 퀴즈</p>
        <span style="margin-top: 15px; font-weight: bold; color: #b45309; font-size: 0.85rem; background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">학습하기</span>
    </a>

</body>
</html>
