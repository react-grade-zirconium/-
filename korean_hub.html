<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>국어 학습 허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --kor-main: #b45309; --kor-bg: #fff7ed; --mini-main: #059669; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--kor-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 60px 40px; gap: 20px;
            flex-wrap: wrap;
        }

        .card { 
            width: 240px; 
            height: 320px; 
            background: white; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(180, 83, 9, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            text-align: center;
            padding: 20px;
        }

        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--kor-main);
            box-shadow: 0 20px 40px rgba(180, 83, 9, 0.15);
        }

        .icon { 
            font-size: 35px; 
            margin-bottom: 15px; 
            background: #fff7ed;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .title { 
            font-size: 1.1rem; 
            font-weight: 900; 
            color: var(--kor-main); 
            margin-bottom: 8px;
            word-break: keep-all;
        }

        .desc { 
            font-size: 0.85rem; 
            color: #7c2d12; 
            line-height: 1.5;
            word-break: keep-all;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .badge {
            margin-top: auto;
            padding: 4px 12px;
            background: var(--kor-main);
            color: white;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        /* 미니 모의고사 전용 스타일 */
        .mini-card:hover { border-color: var(--mini-main); }
        .mini-icon { background: #ecfdf5; }
        .mini-title { color: var(--mini-main); }
        .mini-badge { background: var(--mini-main); }
    </style>
</head>
<body>

    <a href="./korean_talk.html" class="card">
        <div class="icon">💬</div>
        <div class="title">대화의 원리</div>
        <div class="desc">대화 정리</div>
        <div class="badge">CONCEPT</div>
    </a>

    <a href="./korean_debate.html" class="card">
        <div class="icon">🤖</div>
        <div class="title">토론</div>
        <div class="desc">토론 정리</div>
        <div class="badge">DEBATE</div>
    </a>

    <a href="./korean_poem_theory.html" class="card">
        <div class="icon">🌸</div>
        <div class="title">문학의 이해</div>
        <div class="desc">시 개념 핵심 총정리</div>
        <div class="badge">LITERATURE</div>
    </a>

    <a href="./korean_logic_.html" class="card logic-card">
        <div class="icon logic-icon">🦾</div>
        <div class="title logic-title">로봇과 일자리</div>
        <div class="desc">자동화의 명암과 귀납·연역 논증 방법 핵심 정리</div>
        <div class="badge logic-badge">ARGUMENT</div>
    </a>

    <a href="./korean_poem.html" class="card mini-card">
        <div class="icon mini-icon">🎯</div>
        <div class="title mini-title">미니 모의고사 1회</div>
        <div class="desc">핵심 문항 위주의 국어 실전 감각 익히기</div>
        <div class="badge mini-badge">MINI TEST</div>
    </a>

    <a href="./korean_exam2.html" class="card mini-card">
        <div class="icon mini-icon">🎯</div>
        <div class="title mini-title">미니 모의고사 2, 3회</div>
        <div class="desc">핵심 문항 위주의 국어 실전 감각 익히기</div>
        <div class="badge mini-badge">MINI TEST</div>
    </a>

    <a href="./korean_exam4.html" class="card mini-card">
        <div class="icon mini-icon">🎯</div>
        <div class="title mini-title">미니 모의고사 4회</div>
        <div class="desc">핵심 문항 위주의 국어 실전 감각 익히기</div>
        <div class="badge mini-badge">MINI TEST</div>
    </a>

</body>
</html>
