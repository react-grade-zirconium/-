<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>국어 학습 허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --kor-main: #b45309; --kor-bg: #fff7ed; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--kor-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; gap: 25px;
            flex-wrap: wrap;
        }

        .card { 
            width: 280px; 
            height: 380px; 
            background: white; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(180, 83, 9, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            text-align: center;
            padding: 25px;
        }

        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--kor-main);
            box-shadow: 0 20px 40px rgba(180, 83, 9, 0.15);
        }

        .icon { 
            font-size: 55px; 
            margin-bottom: 20px; 
            background: #fff7ed;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .title { 
            font-size: 1.35rem; 
            font-weight: 900; 
            color: var(--kor-main); 
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .desc { 
            font-size: 0.95rem; 
            color: #7c2d12; 
            line-height: 1.6;
            word-break: keep-all;
            opacity: 0.9;
        }

        .badge {
            margin-top: auto;
            padding: 6px 15px;
            background: var(--kor-main);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="./korean_dialogue.html" class="card">
        <div class="icon">💬</div>
        <div class="title">대화의 원리</div>
        <div class="desc">공손성의 원리, 협력의 원리 및 언어 예절 핵심 정리</div>
        <div class="badge">CONCEPT</div>
    </a>

    <a href="./korean_debate.html" class="card">
        <div class="icon">🤖</div>
        <div class="title">로봇세 토론 정리</div>
        <div class="desc">로봇세 부과 찬반 쟁점 및 토론 절차와 개요서 작성법</div>
        <div class="badge" style="background: #ea580c;">HOT ISSUE</div>
    </a>

    <a href="./korean_literature.html" class="card">
        <div class="icon">🌸</div>
        <div class="title">문학의 이해</div>
        <div class="desc">시의 화자와 수사법, 소설의 구성 및 시점 총정리</div>
        <div class="badge">LITERATURE</div>
    </a>

</body>
</html>
