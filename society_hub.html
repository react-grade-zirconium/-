<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>통합사회 학습 허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --soc-main: #f59e0b; --soc-bg: #fffbeb; --soc-accent: #fcd34d; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--soc-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; gap: 25px;
            flex-wrap: wrap;
        }

        .card { 
            width: 280px; 
            height: 380px; 
            background: white; 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            text-align: center;
            padding: 25px;
        }

        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--soc-main);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.15);
        }

        .icon { 
            font-size: 55px; 
            margin-bottom: 20px; 
            background: #fffbeb;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .title { 
            font-size: 1.35rem; 
            font-weight: 900; 
            color: var(--soc-main); 
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .desc { 
            font-size: 0.95rem; 
            color: #b45309; 
            line-height: 1.6;
            word-break: keep-all;
            opacity: 0.9;
        }

        .badge {
            margin-top: auto;
            padding: 6px 15px;
            background: var(--soc-main);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="./society_happiness.html" class="card">
        <div class="icon">💎</div>
        <div class="title">통합적 관점과 행복</div>
        <div class="desc">통합적 관점과 적용, 행복의 기준과 조건</div>
        <div class="badge">ESSENTIAL</div>
    </a>

    <a href="./society_geography.html" class="card">
        <div class="icon">☀️</div>
        <div class="title">기후 총정리</div>
        <div class="desc">기후 개념 정리와 문제 풀이, 그래프/지도 해석 퀴즈</div>
        <div class="badge">TEST & STUDY</div>
    </a>

    <a href="./society_environment.html" class="card">
        <div class="icon">🌿</div>
        <div class="title">자연환경과 인간</div>
        <div class="desc">지형, 자연재해, 자연관 및 환경 보전을 위한 노력 핵심 정리</div>
        <div class="badge" style="background: #10b981;">CORE SUMMARY</div>
    </a>

</body>
</html>
