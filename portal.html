<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY MAX FINAL — 기말고사 학습 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc;
            --kor-theme: #b45309; --eng-theme: #10b981; --sci-theme: #0891b2; --soc-theme: #f59e0b;
            --ai-theme: #8b5cf6; --thanks-theme: #f43f5e; --hist-theme: #1e3a8a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 270px; background: var(--dark); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 26px 20px; font-size: 1.45rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: #60a5fa; }
        .subject-list { flex: 1; padding: 12px 0; overflow-y: auto; }
        .subject-item { padding: 15px 22px; cursor: pointer; transition: 0.25s; opacity: 0.68; display: flex; align-items: center; gap: 10px; }
        .subject-item:hover { background: rgba(255,255,255,0.06); opacity: 1; }
        .subject-item.active { opacity: 1; background: var(--primary); font-weight: 700; border-left: 5px solid #fff; }
        .sidebar-footer { padding: 18px; border-top: 1px solid rgba(255,255,255,0.1); }
        .home-btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: #cbd5e1; text-decoration: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; }
        .main-content { flex: 1; padding: 22px; display: flex; flex-direction: column; }
        .subject-title { font-size: 1.55rem; font-weight: 800; border-left: 8px solid var(--primary); padding-left: 14px; margin-bottom: 14px; }
        .content-container { flex: 1; background: #fff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .internal-box { display: none; width: 100%; height: 100%; background: #f8fafc; flex-direction: column; padding: 30px; overflow-y: auto; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
        .dash-card { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; }
        .dash-card h3 { font-size: .95rem; color: #475569; margin-bottom: 8px; }
        .dash-value { font-size: 1.6rem; font-weight: 900; color: #0f172a; }
        .notes-area { background: white; border: 1px solid #cbd5e1; border-radius: 14px; padding: 20px; }
        .notes-area h3 { font-size: 1.1rem; margin-bottom: 10px; color: #1e293b; }
        .notes-area p { font-size: .92rem; color: #64748b; margin-bottom: 10px; }
        .notes-area textarea { width: 100%; min-height: 240px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; resize: vertical; font-family: inherit; }
        .notes-actions { margin-top: 10px; display: flex; gap: 8px; }
        .notes-actions button { border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 700; }
        .save-btn { background: #2563eb; color: #fff; }
        .clear-btn { background: #e2e8f0; color: #334155; }
        .save-msg { font-size: .84rem; color: #0f766e; margin-top: 8px; min-height: 16px; }
        .draw-tools { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .draw-tools input[type="color"] { width: 42px; height: 34px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; padding: 2px; }
        .draw-tools input[type="range"] { width: 120px; }
        .draw-canvas-wrap { margin-top: 10px; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; overflow: hidden; }
        #drawCanvas { width: 100%; height: 260px; display: block; touch-action: none; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">STUDY MAX FINAL</div>
    <div class="subject-list">
        <div class="subject-item active" onclick="go('', 'dashboard', this)">🏁 기말 학습 대시보드</div>
        <div class="subject-item" onclick="go('korean_hub.html', 'korean', this)">📖 국어</div>
        <div class="subject-item" onclick="go('english_hub.html', 'english', this)">📝 영어</div>
        <div class="subject-item" onclick="go('science_hub.html', 'science', this)">🧪 통합과학</div>
        <div class="subject-item" onclick="go('society_hub.html', 'society', this)">🌍 통합사회</div>
        <div class="subject-item" onclick="go('', 'history', this)">📚 한국사</div>
        <div class="subject-item" onclick="go('mega_study.html', 'info', this)">💻 정보</div>
        <div class="subject-item" onclick="go('ai_generator.html', 'ai', this)">🤖 AI 문제 생성기</div>
    </div>
    <div class="sidebar-footer"><a href="./index.html" class="home-btn" target="_top">🏠 인트로 화면으로</a></div>
</div>
<div class="main-content">
    <h1 id="mainTitle" class="subject-title">기말고사 학습 대시보드</h1>
    <div class="content-container">
        <iframe id="mainFrame" src="./korean_hub.html" style="display:none"></iframe>
        <div id="dashboardBox" class="internal-box" style="display:flex;">
            <div class="dashboard-grid">
                <div class="dash-card"><h3>기말 D-DAY</h3><div class="dash-value">D-21</div></div>
                <div class="dash-card"><h3>오늘 목표</h3><div class="dash-value">3단원</div></div>
                <div class="dash-card"><h3>누적 학습시간</h3><div class="dash-value">8h 40m</div></div>
            </div>
            <div class="notes-area">
                <h3>📝 기말 대비 핵심 필기</h3>
                <p>오늘 외울 개념, 헷갈리는 포인트, 오답 메모를 자유롭게 기록하세요.</p>
                <textarea id="notesInput" placeholder="예시) 한국사 개항기: 통리기무아문(1880), 갑신정변(1884) 핵심 비교"></textarea>
                <div class="notes-actions">
                    <button class="save-btn" onclick="saveNotes()">필기 저장</button>
                    <button class="clear-btn" onclick="clearNotes()">필기 비우기</button>
                </div>
                <div class="save-msg" id="saveMsg"></div>
                <div class="draw-tools">
                    <strong style="font-size:.9rem;color:#334155;">직접 그리기</strong>
                    <input id="drawColor" type="color" value="#1e293b" aria-label="펜 색상">
                    <input id="drawSize" type="range" min="1" max="12" value="3" aria-label="펜 두께">
                    <button class="save-btn" onclick="saveDrawing()">그림 저장</button>
                    <button class="clear-btn" onclick="clearDrawing()">그림 지우기</button>
                </div>
                <div class="draw-canvas-wrap">
                    <canvas id="drawCanvas"></canvas>
                </div>
            </div>
        </div>
        <div id="historyHub" class="internal-box"><p>한국사 요약/부록은 기존 자료 페이지로 이동해 학습하세요.</p></div>
    </div>
</div>
<script>
    function go(url, type, el) {
        if (el) {
            document.querySelectorAll('.subject-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }
        const frame = document.getElementById('mainFrame');
        const dashboard = document.getElementById('dashboardBox');
        const historyHub = document.getElementById('historyHub');
        const title = document.getElementById('mainTitle');
        frame.style.display = 'none'; dashboard.style.display = 'none'; historyHub.style.display = 'none';

        if (type === 'dashboard') {
            dashboard.style.display = 'flex'; title.innerText = '기말고사 학습 대시보드'; title.style.borderLeftColor = 'var(--primary)';
        } else if (type === 'history') {
            frame.style.display = 'block'; frame.src = './history_interactive.html'; title.innerText = '한국사 범위 정리'; title.style.borderLeftColor = 'var(--hist-theme)';
        } else {
            frame.style.display = 'block'; frame.src = './' + url;
            if(type === 'korean') { title.innerText = '국어 기말 범위'; title.style.borderLeftColor = 'var(--kor-theme)'; }
            else if(type === 'english') { title.innerText = '영어 기말 범위'; title.style.borderLeftColor = 'var(--eng-theme)'; }
            else if(type === 'science') { title.innerText = '통합과학 기말 범위'; title.style.borderLeftColor = 'var(--sci-theme)'; }
            else if(type === 'society') { title.innerText = '통합사회 기말 범위'; title.style.borderLeftColor = 'var(--soc-theme)'; }
            else if(type === 'info') { title.innerText = '정보 기말 범위'; title.style.borderLeftColor = '#0d9488'; }
            else if(type === 'ai') { title.innerText = 'AI 문제 생성기'; title.style.borderLeftColor = 'var(--ai-theme)'; }
        }
    }

    function saveNotes() {
        const value = document.getElementById('notesInput').value;
        localStorage.setItem('studymax-final-notes', value);
        document.getElementById('saveMsg').innerText = '저장 완료! (브라우저에 보관됨)';
    }
    function clearNotes() {
        document.getElementById('notesInput').value = '';
        localStorage.removeItem('studymax-final-notes');
        document.getElementById('saveMsg').innerText = '필기를 비웠습니다.';
    }

    let canvas, ctx, drawing = false, lastX = 0, lastY = 0;

    function initDrawingPad() {
        canvas = document.getElementById('drawCanvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');

        const resizeCanvas = () => {
            const data = canvas.toDataURL('image/png');
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.floor(rect.width);
            canvas.height = 260;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (data !== 'data:,') {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                img.src = data;
            }
        };

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches[0]) return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
            return [e.clientX - rect.left, e.clientY - rect.top];
        };

        const start = (e) => {
            drawing = true;
            [lastX, lastY] = getPos(e);
        };
        const move = (e) => {
            if (!drawing) return;
            e.preventDefault();
            const [x, y] = getPos(e);
            ctx.strokeStyle = document.getElementById('drawColor').value;
            ctx.lineWidth = document.getElementById('drawSize').value;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            [lastX, lastY] = [x, y];
        };
        const end = () => drawing = false;

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start, { passive: true });
        canvas.addEventListener('touchmove', move, { passive: false });
        canvas.addEventListener('touchend', end);

        const savedImage = localStorage.getItem('studymax-final-drawing');
        if (savedImage) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            img.src = savedImage;
        }
    }

    function saveDrawing() {
        if (!canvas) return;
        localStorage.setItem('studymax-final-drawing', canvas.toDataURL('image/png'));
        document.getElementById('saveMsg').innerText = '필기 + 그림 저장 완료!';
    }

    function clearDrawing() {
        if (!ctx || !canvas) return;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        localStorage.removeItem('studymax-final-drawing');
        document.getElementById('saveMsg').innerText = '그림을 지웠습니다.';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('studymax-final-notes');
        if (saved) document.getElementById('notesInput').value = saved;
        initDrawingPad();
    });
</script>
</body>
</html>
