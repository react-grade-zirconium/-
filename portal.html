<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY MAX — 통합 학습 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; 
            --dark: #1e293b; 
            --bg: #f8fafc; 
            --kor-theme: #b45309;
            --sci-theme: #0891b2;
            --soc-theme: #f59e0b;
            --ai-theme: #8b5cf6;
            --thanks-theme: #ef4444; /* SUPER THANKS 테마색 */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* 사이드바 스타일 */
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        .sidebar-header { padding: 30px 20px; font-size: 1.5rem; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; color: #60a5fa; cursor: default; }
        
        .subject-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        .subject-item { padding: 16px 25px; cursor: pointer; transition: 0.3s; opacity: 0.6; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; }
        .subject-item:hover { background: rgba(255,255,255,0.05); opacity: 1; }
        .subject-item.active { opacity: 1; background: var(--primary); font-weight: bold; border-left: 5px solid #fff; }

        /* 하단 홈 버튼 */
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .home-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            color: #94a3b8; text-decoration: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: 700; transition: 0.3s;
        }
        .home-btn:hover { background: #ef4444; color: white; }

        /* 메인 영역 */
        .main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 100vh; }
        .subject-header { margin-bottom: 15px; }
        .subject-title { font-size: 1.6rem; font-weight: 800; border-left: 8px solid var(--primary); padding-left: 15px; transition: 0.3s; }

        .frame-box { flex: 1; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">STUDY MAX</div>
    
    <div class="subject-list">
        <div class="subject-item active" onclick="go('korean_hub.html', 'korean', this)">📖 국어 (시/대화)</div>
        <div class="subject-item" onclick="go('science_hub.html', 'science', this)">🧪 통합과학 (물/화/생/지)</div>
        <div class="subject-item" onclick="go('society_hub.html', 'society', this)">🌍 통합사회 (행복/지리)</div>
        <div class="subject-item" onclick="go('history_interactive.html', 'history', this)">📚 한국사</div>
        <div class="subject-item" onclick="go('mega_study.html', 'info', this)">💻 정보 (알고리즘)</div>
        <div class="subject-item" onclick="go('ai_generator.html', 'ai', this)">🤖 AI 무한 문제 생성기</div>
        <div class="subject-item" onclick="go('super_thanks.html', 'thanks', this)" style="color: #fda4af;">❤️ SUPER THANKS</div>
    </div>

    <div class="sidebar-footer">
        <a href="./index.html" class="home-btn" target="_top">
            <span>🏠</span> 인트로 화면으로
        </a>
    </div>
</div>

<div class="main-content">
    <div class="subject-header">
        <h1 id="mainTitle" class="subject-title">국어 통합 학습 허브</h1>
    </div>
    <div class="frame-box">
        <iframe id="mainFrame" src="./korean_hub.html"></iframe>
    </div>
</div>

<script>
    function go(url, type, el) {
        document.querySelectorAll('.subject-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');

        const frame = document.getElementById('mainFrame');
        const title = document.getElementById('mainTitle');

        if(type === 'korean') {
            title.innerText = "국어 (모의고사 및 대화의 원리)";
            title.style.borderLeftColor = 'var(--kor-theme)';
        } else if(type === 'science') {
            title.innerText = "통합과학 (물리·화학·생명·지구)";
            title.style.borderLeftColor = 'var(--sci-theme)';
        } else if(type === 'society') {
            title.innerText = "통합사회 (행복 및 지리)";
            title.style.borderLeftColor = 'var(--soc-theme)';
        } else if(type === 'history') {
            title.innerText = "한국사 인터랙티브";
            title.style.borderLeftColor = 'var(--primary)';
        } else if(type === 'info') {
            title.innerText = "정보 (알고리즘 및 프로그래밍)";
            title.style.borderLeftColor = '#0d9488';
        } else if(type === 'ai') {
            title.innerText = "AI 무한 문제 생성기 (Beta)";
            title.style.borderLeftColor = 'var(--ai-theme)';
        } else if(type === 'thanks') {
            title.innerText = "SUPER THANKS — 감사의 인사";
            title.style.borderLeftColor = 'var(--thanks-theme)';
        }

        frame.src = "./" + url;
    }
</script>
</body>
</html>
